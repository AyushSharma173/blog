media:
  input: public/uploads
  output: /uploads

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    view:
      fields: [title, date, font, draft]
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    filename: '{primary}.md'
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
        default: '{currentDate}'
      - name: font
        label: Font
        description: Serif for essays, sans for technical notes.
        type: select
        required: true
        options:
          creatable: false
          multiple: false
          values: [serif, sans]
        default: serif
      - name: description
        label: Description
        description: Short blurb used in RSS and meta tags.
        type: string
      - name: draft
        label: Draft
        description: If checked, hidden from production build.
        type: boolean
        default: false
      - name: body
        label: Body
        type: text
        options:
          format: markdown
        required: true

  - name: about
    label: About page
    type: file
    path: src/content/pages/about.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: font
        label: Font
        description: Serif or sans for the About page body.
        type: select
        required: true
        options:
          creatable: false
          multiple: false
          values: [serif, sans]
        default: serif
      - name: body
        label: Body
        type: text
        options:
          format: markdown
        required: true

  - name: settings
    label: Site settings
    type: file
    path: src/data/site.json
    format: json
    fields:
      - name: title
        label: Site title
        description: Shown in browser tab, RSS feed, and meta tags.
        type: string
        required: true
      - name: description
        label: Site description
        description: Default meta description and RSS channel description.
        type: string
        required: true
      - name: author
        label: Author name
        type: string
        required: true
      - name: author_email
        label: Contact email
        type: string
        required: true
      - name: home_heading
        label: Home heading
        description: Large heading at the top of the home page.
        type: string
        required: true
      - name: home_bio
        label: Home bio paragraph
        description: "Shown below the heading. Markdown is rendered: *italic*, **bold**, [links](url), newlines become line breaks, double newlines become paragraph breaks."
        type: text
        required: true
      - name: home_font
        label: Home page font
        description: Overall font for the home page (heading + writing list).
        type: select
        required: true
        options:
          creatable: false
          multiple: false
          values: [serif, sans]
        default: serif
      - name: home_bio_font
        label: Home bio font family
        description: Font family just for the bio paragraph.
        type: select
        required: true
        options:
          creatable: false
          multiple: false
          values: [serif, sans]
        default: serif
      - name: home_bio_size
        label: Home bio size
        description: Overall size of the bio text.
        type: select
        required: true
        options:
          creatable: false
          multiple: false
          values: [text-xs, text-sm, text-base, text-lg, text-xl, text-2xl, text-3xl]
        default: text-base
      - name: home_bio_italic
        label: Home bio italic
        description: Render the whole bio in italic. (You can also do inline italics via *asterisks* in the bio text itself.)
        type: boolean
        default: false
      - name: home_bio_weight
        label: Home bio weight
        description: Normal or semibold. Use **double asterisks** in the bio for inline bold instead if you only want parts bolded.
        type: select
        required: true
        options:
          creatable: false
          multiple: false
          values: [normal, semibold]
        default: normal
      - name: home_bio_align
        label: Home bio alignment
        description: Horizontal alignment of the bio paragraph.
        type: select
        required: true
        options:
          creatable: false
          multiple: false
          values: [left, center, right]
        default: left
